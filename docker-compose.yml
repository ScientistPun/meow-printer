services:
  meow-printer:
    image: scientistpun/meow-printer:1.3.5
    container_name: meow-printer
    ports:
      - "3000:3000"
    environment:
      - CUPS_HOST=192.168.10.1
      - CUPS_PORT=631
    volumes:
      - /var/run/cups.sock:/var/run/cups.sock:ro
      - ./public:/app/public
      - ./logs:/app/logs
    restart: unless-stopped
    network_mode: host
