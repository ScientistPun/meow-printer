services:
  meow-printer:
    build: .
    image: meow-printer:latest
    container_name: meow-printer
    ports:
      - "3000:3000"
    environment:
      - CUPS_HOST=192.168.10.1
      - CUPS_PORT=631
      - DEV=false
      - TZ=Asia/Shanghai
    volumes:
      - ./public:/app/public
      - ./logs:/app/logs
    restart: unless-stopped
    network_mode: host
