<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>打印</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f1f1f1}
    .print-window{width:100%;max-width:1000px;margin:0 auto;background:white;box-shadow:0 0 20px #00000010}
    .settings{width:100%;padding:22px;border-bottom:1px solid #eee}
    .preview{width:100%;padding:22px;background:#f9f9f9}
    .preview-box{width:100%;height:420px;background:white;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;color:#888;border-radius:8px;overflow:hidden}
    .preview-box img {max-width:100%;max-height:100%;object-fit:contain}
    h3{margin:0 0 16px;font-size:18px}
    .item{margin:14px 0}
    label{display:block;margin-bottom:6px;font-size:14px;color:#333}
    select,input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;-webkit-appearance:none;appearance:none}
    button{width:100%;padding:14px;background:#007aff;color:white;border:none;border-radius:10px;font-size:16px;margin-top:16px;font-weight:500}
    .split-row{display:flex;gap:10px}
    .split-row .item{flex:1}
    input[type="file"]{padding:6px;border:0}

    @media (min-width:600px){
      .print-window{display:flex;margin:30px auto;border-radius:12px;overflow:hidden}
      .settings{width:360px;border-right:1px solid #eee;border-bottom:0}
      .preview{flex:1}
    }
  </style>
</head>
<body>

<div class="print-window">
  <div class="settings">
    <h3>🖨️ 打印设置</h3>

    <div class="item">
      <label>方向</label>
      <select id="orientation">
        <option value="portrait">纵向</option>
        <option value="landscape">横向</option>
      </select>
    </div>

    <div class="item">
      <label>纸张尺寸</label>
      <select id="paper">
        <option value="A4">A4 210×297mm</option>
        <option value="A5">A5 148×210mm</option>
        <option value="100x150">100×150mm 标签</option>
        <option value="80x60">80×60mm 标签</option>
        <option value="custom">自定义</option>
      </select>
    </div>

    <div class="split-row">
      <div class="item">
        <label>宽(mm)</label>
        <input type="number" id="w" value="210">
      </div>
      <div class="item">
        <label>高(mm)</label>
        <input type="number" id="h" value="297">
      </div>
    </div>

    <div class="item">
      <label>页面范围</label>
      <input id="pages" placeholder="例如：1,2,3-5">
    </div>

    <div class="item">
      <label>每页版数</label>
      <select id="persheet">
        <option value="1">1版</option>
        <option value="2">2版</option>
        <option value="4">4版</option>
        <option value="6">6版</option>
        <option value="9">9版</option>
      </select>
    </div>

    <div class="item">
      <label>缩放</label>
      <input type="number" id="scale" value="1.0" step="0.1">
    </div>

    <div class="item">
      <label>旋转</label>
      <select id="rotate">
        <option value="0">0°</option>
        <option value="90">90°</option>
        <option value="180">180°</option>
        <option value="270">270°</option>
      </select>
    </div>

    <div class="item">
      <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <button onclick="submitPrint()">📤 发送打印任务</button>
  </div>

  <div class="preview">
    <h3>预览</h3>
    <div class="preview-box" id="preview">
      选择PDF后自动预览
    </div>
  </div>
</div>

<script>
let file = null
let previewUrl = null

// 选择PDF → 实时预览
document.getElementById('pdfFile').onchange = (e) => {
  file = e.target.files[0]
  if (!file) return

  // 显示预览
  previewUrl = URL.createObjectURL(file)
  const preview = document.getElementById('preview')
  preview.innerHTML = `<img src="${previewUrl}" />`
}

// 纸张尺寸自动切换
document.getElementById('paper').onchange = () => {
  const v = document.getElementById('paper').value
  if(v=='A4'){document.getElementById('w').value=210;document.getElementById('h').value=297}
  if(v=='A5'){document.getElementById('w').value=148;document.getElementById('h').value=210}
  if(v=='100x150'){document.getElementById('w').value=100;document.getElementById('h').value=150}
  if(v=='80x60'){document.getElementById('w').value=80;document.getElementById('h').value=60}
}

// 提交打印
async function submitPrint(){
  if(!file)return alert('请选择PDF文件')

  const form = new FormData()
  form.append('pdf', file)
  form.append('width', document.getElementById('w').value)
  form.append('height', document.getElementById('h').value)
  form.append('landscape', document.getElementById('orientation').value=='landscape'?'true':'false')
  form.append('scale', document.getElementById('scale').value)
  form.append('pageRange', document.getElementById('pages').value)
  form.append('pagesPerSheet', document.getElementById('persheet').value)
  form.append('rotate', document.getElementById('rotate').value)

  try{
    const res = await fetch('/print', {
      method: 'POST',
      body: form,
      credentials: 'omit'
    })
    const json = await res.json()
    alert(json.msg || '打印已发送')
  }catch(e){
    alert('发送失败：' + e.message)
  }
}
</script>
</body>
</html>
